services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aletheia
      POSTGRES_PASSWORD: aletheia
      POSTGRES_DB: aletheia
    ports:
      - "55432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
